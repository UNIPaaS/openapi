              - bankTransfer
              - creditCard
              - card
              - directDebit
              - taxFreeChildcare
            type: string
        - name: dueDaterange
          required: false
          in: query
          schema:
            type: array
            items:
              type: string
              format: date-time
        - name: consumerEmail
          required: false
