      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizeRequest'
            examples:
              onboarding-ui:
                value:
                  scopes:
                    - onboarding_write
                  vendorId: string
              ewallet-ui:
                value:
                  scopes:
                    - ewallet_read
                    - payout_write
                    - link_read
                    - link_write
                  vendorId: string
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizeResponse'
        '400':
          description: ''
        '401':
          description: ''
      tags:
        - Authentication
      security:
        - bearer: []
