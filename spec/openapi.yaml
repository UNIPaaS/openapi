info:
  title: UNIPaaS Platform API
  description: UNIPaaS API for Platforms was implemented in a RESTful state of mind, our API has straight-forward, resource-oriented endpoints and produces standard HTTP response codes to communicate back the result of operations. We comply with most common HTTP standard, such as HTTP verbs, authentication and resource nesting.
  version: '1.12'
  contact: {}
tags: []
servers:
  - url: https://sandbox.unipaas.com/platform
  - url: https://api.unipaas.com/platform
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    OnboardingType:
      type: string
      enum:
        - individual
        - company
        - non-profit
    VendorReferencePayload:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
          example: john.doe@example.com
        reference:
          type: string
          example: vendor-ref-123
        type:
          example: individual
          $ref: '#/components/schemas/OnboardingType'
        category:
          type: string
        categoryDescription:
          type: string
      required:
        - reference
    AuthorizeRequest:
      type: object
      properties:
        scopes:
          type: array
          items:
            type: string
            enum:
              - master
              - viewer
              - developer
              - onboarding_read
              - onboarding_write
              - ewallet_read
              - ewallet_write
              - websdk_access
              - payout_write
              - payout_read
              - checkout_create
              - link_read
              - link_write
              - public_config_read
              - notification_read
              - notification_write
              - config_read
              - login_access
              - direct_debit_write
              - direct_debit_read
              - consumer_public_access
        vendorId:
          type: string
        vendor:
          $ref: '#/components/schemas/VendorReferencePayload'
      required:
        - scopes
    AuthorizeResponse:
      type: object
      properties:
        accessToken:
          type: string
        expiresIn:
          type: string
        vendorId:
          type: string
        scopes:
          type: array
          items:
            type: string
            enum:
              - master
              - viewer
              - developer
              - onboarding_read
              - onboarding_write
              - ewallet_read
              - ewallet_write
              - websdk_access
              - payout_write
              - payout_read
              - checkout_create
              - link_read
              - link_write
              - public_config_read
              - notification_read
              - notification_write
              - config_read
              - login_access
              - direct_debit_write
              - direct_debit_read
              - consumer_public_access
      required:
        - accessToken
        - expiresIn
        - vendorId
        - scopes
    VendorPayload:
      type: object
      properties:
        businessName:
          type: string
          example: UNIPaaS
        firstName:
          type: string
          example: John
        middleName:
          type: string
          example: Fitzgerald
        lastName:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        country:
          type: string
          format: ISO 3166-1 alpha-2
          example: GB
        phone:
          type: string
          example: '+447911123456'
        birthDate:
          type: string
          format: YYYY-MM-DD
          example: '1980-01-01'
        serviceDescription:
          type: string
          example: Service description
        url:
          type: string
          example: https://platform.com
        category:
          type: string
          enum:
            - ONLINE_SERVICES
            - DIGITAL_GOODS
            - ONLINE_RETAIL
            - AGRICULTURAL_CO_OP
            - ARTIST_SUPPLY
            - MEMBERSHIP_CLUB
            - RECREATIONAL_FISHING
            - HEALTH_AND_FITNESS
            - SPORTS_CLUB
            - CATERERS
            - CONSTRUCTION_MATERIALS
            - SCHOOLS_EDUCATION_SERVICES
            - ENGINEERING_AND_SURVEYING_SERVICES
            - HEALTH_AND_MEDICAL_SERVICES
            - TELECOMMUNICATION_SERVICES
            - INDUSTRIAL_SUPPLIES
            - MEDIA_ADVERTISING_SERVICES
            - UTILITIES
            - FURNITURE_AND_HOME_FURNISHINGS
            - PROFESSIONAL_SERVICES
            - MISC_AND_RETAIL_STORES
            - PERSONAL_SERVICES
            - WHOLESALE_CLUBS
            - MANAGEMENT
            - ARCHITECTURAL_SERVICES
            - GENERAL_CONTRACTORS
            - GROCERIES_AND_SUPERMARKETS
            - TRANSPORTATION
            - TRANSPORT
            - VETERINARY_SERVICES
            - REAL_ESTATE_AGENTS
            - FUNERAL_SERVICES
            - CHILD_CARE_SERVICES
            - MOTOR_VEHICLE_SUPPLIES
            - CHARITABLE_AND_SOCIAL_SERVICE_ORGANIZATIONS
            - STUDIOS_AND_REHEARSAL_ROOMS
            - CREATIVE_SPACES
            - ELEMENTARY_OR_SECONDARY_SCHOOLS
          example: DIGITAL_GOODS
        type:
          example: individual
          $ref: '#/components/schemas/OnboardingType'
        createOnboardingLink:
          type: boolean
          default: false
          example: true
        metadata:
          type: object
          example:
            product: Embedded Components
        communicationEmail:
          type: string
          format: email
          example: john.doe@example.com
      required:
        - firstName
        - lastName
        - email
        - country
    CreatedVendor:
      type: object
      properties:
        businessName:
          type: string
          example: UNIPaaS
        middleName:
          type: string
          example: Fitzgerald
        email:
          type: string
          format: email
          example: john.doe@example.com
        phone:
          type: string
          example: '+447911123456'
        birthDate:
          type: string
          format: YYYY-MM-DD
          example: '1980-01-01'
        serviceDescription:
          type: string
          example: Service description
        url:
          type: string
          example: https://platform.com
        category:
          type: string
          enum:
